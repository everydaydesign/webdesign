<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Webbdesign</title>
    <script>
      (function () {
        try {
          document.documentElement.dataset.theme = localStorage.getItem("theme") || "light";
        } catch (e) {}
      })();
    </script>
    <style>
      :root {
        --bg: #eef1f5;
        --surface: #ffffff;
        --tile: #eef0ff;
        --hairline: #e3e8ee;
        --ink: #0d253d;
        --mute: #64748d;
        --brand: #533afd;
      }
      :root[data-theme="dark"] {
        --bg: #10141f;
        --surface: #191f2b;
        --tile: #262b41;
        --hairline: #2b3242;
        --ink: #e6e9f1;
        --mute: #94a0b3;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .topbar { position: sticky; top: 0; z-index: 50; background: #1c1e54; }
      .topbar-inner {
        max-width: 1080px;
        margin: 0 auto;
        height: 64px;
        padding: 0 40px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .topbar-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
      .topbar-mark { width: 32px; height: 32px; border-radius: 7px; background: #fff; display: grid; place-items: center; }
      .topbar-title { font-size: 15px; font-weight: 600; color: #fff; }
      .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 4px; }

      .icon-btn {
        display: grid;
        place-items: center;
        width: 36px;
        height: 36px;
        padding: 0;
        border: none;
        background: none;
        color: #eae7ff;
        cursor: pointer;
        list-style: none;
      }
      .icon-btn::-webkit-details-marker { display: none; }
      .icon-btn:hover { color: #fff; }
      .theme-toggle .icon-moon { display: none; }
      :root[data-theme="dark"] .theme-toggle .icon-sun { display: none; }
      :root[data-theme="dark"] .theme-toggle .icon-moon { display: block; }

      .lang-menu { position: relative; }
      .lang-panel {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        z-index: 30;
        display: flex;
        flex-direction: column;
        min-width: 168px;
        padding: 6px;
        border: 1px solid var(--hairline);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 14px 34px -12px rgba(13, 37, 61, 0.28);
      }
      .lang-panel a {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 7px 10px;
        border-radius: 5px;
        font-size: 13px;
        color: var(--ink);
        text-decoration: none;
        white-space: nowrap;
      }
      .lang-panel a:hover { background: var(--tile); }
      .lang-panel a[aria-current] { color: var(--brand); font-weight: 600; }
      .flag { font-size: 15px; line-height: 1; }

      .hub {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 36px;
        padding: 64px 40px;
        text-align: center;
      }
      .hub-title { margin: 0; font-size: 34px; font-weight: 300; letter-spacing: -1px; color: var(--ink); }
      .hub-sub { margin: 8px 0 0; font-size: 15px; color: var(--mute); }
      .cards { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
      .card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 220px;
        padding: 30px 24px;
        background: var(--surface);
        border: 1px solid var(--hairline);
        border-radius: 8px;
        box-shadow: 0 1px 2px rgba(13, 37, 61, 0.04), 0 18px 40px -26px rgba(13, 37, 61, 0.24);
        text-decoration: none;
        transition: border-color 0.15s ease;
      }
      .card:hover { border-color: var(--brand); }
      .card-icon { width: 52px; height: 52px; border-radius: 50%; background: var(--tile); display: grid; place-items: center; color: var(--brand); }
      .card-label { font-size: 16px; font-weight: 600; color: var(--ink); }
      .card-hint { font-size: 12.5px; color: var(--mute); }

      .foot { padding: 24px 40px; text-align: center; font-size: 12px; color: var(--mute); }
      .foot a { color: var(--brand); text-decoration: none; }
    </style>
  </head>
  <body>
    <nav class="topbar">
      <div class="topbar-inner">
        <a class="topbar-brand" href="https://everydaydesign.github.io/webdesign/">
          <span class="topbar-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#533afd" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="7" height="7" x="3" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="14" rx="1"></rect><rect width="7" height="7" x="3" y="14" rx="1"></rect></svg></span>
          <span class="topbar-title">Webbdesign</span>
        </a>
        <div class="topbar-right">
          <details class="lang-menu">
            <summary class="icon-btn" aria-label="Språk" title="Språk"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"></circle><path d="M2 12h20"></path><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg></summary>
            <div class="lang-panel"><a href="./" aria-current="true"><span class="flag">🇸🇪</span> Svenska</a><a href="en/"><span class="flag">🇺🇸</span> English</a></div>
          </details>
          <button type="button" class="icon-btn theme-toggle" data-theme-toggle aria-label="Växla mörkt läge"><svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path></svg><svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"></path></svg></button>
        </div>
      </div>
    </nav>

    <main class="hub">
      <div>
        <h1 class="hub-title">Webbdesign</h1>
        <p class="hub-sub">Välj en resurs för att komma igång</p>
      </div>
      <div class="cards">
        <a class="card" href="https://everydaydesign.github.io/git-guide/languages/sv/">
          <span class="card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="6" x2="6" y1="3" y2="15"></line><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path></svg></span>
          <span class="card-label">Guide till Git</span>
          <span class="card-hint">Samarbeta med Git</span>
        </a>
        <a class="card" href="https://everydaydesign.github.io/website/guide/">
          <span class="card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg></span>
          <span class="card-label">Statisk webbplats</span>
          <span class="card-hint">HTML- & CSS-mall</span>
        </a>
        <a class="card" href="https://everydaydesign.github.io/web-app/guide/">
          <span class="card-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"></path></svg></span>
          <span class="card-label">Dynamisk webbplats</span>
          <span class="card-hint">PHP- & MySQL-mall</span>
        </a>
      </div>
    </main>

    <footer class="foot">
      © 2026 Montathar Faraon · Licensierad under
      <a href="https://github.com/everydaydesign/webdesign/blob/main/LICENSE">MIT-licensen</a>
    </footer>

    <script>
      (function () {
        var root = document.documentElement;
        var btn = document.querySelector("[data-theme-toggle]");
        if (btn) {
          btn.addEventListener("click", function () {
            var next = root.dataset.theme === "dark" ? "light" : "dark";
            root.dataset.theme = next;
            try { localStorage.setItem("theme", next); } catch (e) {}
          });
        }
        var menu = document.querySelector("details.lang-menu");
        if (menu) {
          document.addEventListener("click", function (e) {
            if (menu.open && !menu.contains(e.target)) menu.open = false;
          });
        }
      })();
    </script>
  </body>
</html>
