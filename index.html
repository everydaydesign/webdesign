<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Web design — resources</title>
    <script>
      (function () {
        try {
          document.documentElement.dataset.theme = localStorage.getItem("theme") || "light";
        } catch (e) {}
      })();
    </script>
    <style>
      /* Colour tokens (light default + dark overrides) */
      :root {
        --bg: #eef1f5;
        --surface: #ffffff;
        --tile: #eef0ff;
        --hairline: #e3e8ee;
        --ink: #0d253d;
        --mute: #64748d;
        --brand: #533afd;
      }
      :root[data-theme="dark"] {
        --bg: #10141f;
        --surface: #191f2b;
        --tile: #262b41;
        --hairline: #2b3242;
        --ink: #e6e9f1;
        --mute: #94a0b3;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* Sticky navy navbar */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 50;
        background: #1c1e54;
      }
      .topbar-inner {
        max-width: 1080px;
        margin: 0 auto;
        height: 64px;
        padding: 0 40px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .topbar-brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .topbar-mark {
        width: 32px;
        height: 32px;
        border-radius: 7px;
        background: #fff;
        display: grid;
        place-items: center;
      }
      .topbar-title {
        font-size: 15px;
        font-weight: 600;
        color: #fff;
      }
      .theme-toggle {
        margin-left: auto;
        display: grid;
        place-items: center;
        width: 36px;
        height: 36px;
        padding: 0;
        border: none;
        background: none;
        color: #eae7ff;
        cursor: pointer;
      }
      .theme-toggle:hover {
        color: #fff;
      }
      .theme-toggle .icon-moon {
        display: none;
      }
      :root[data-theme="dark"] .theme-toggle .icon-sun {
        display: none;
      }
      :root[data-theme="dark"] .theme-toggle .icon-moon {
        display: block;
      }

      /* Centred hub */
      .hub {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 36px;
        padding: 64px 40px;
        text-align: center;
      }
      .hub-title {
        margin: 0;
        font-size: 34px;
        font-weight: 300;
        letter-spacing: -1px;
        color: var(--ink);
      }
      .hub-sub {
        margin: 8px 0 0;
        font-size: 15px;
        color: var(--mute);
      }

      .cards {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
      }
      .card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 220px;
        padding: 30px 24px;
        background: var(--surface);
        border: 1px solid var(--hairline);
        border-radius: 8px;
        box-shadow:
          0 1px 2px rgba(13, 37, 61, 0.04),
          0 18px 40px -26px rgba(13, 37, 61, 0.24);
        text-decoration: none;
        transition: border-color 0.15s ease;
      }
      .card:hover {
        border-color: var(--brand);
      }
      .card-icon {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: var(--tile);
        display: grid;
        place-items: center;
        color: var(--brand);
      }
      .card-label {
        font-size: 16px;
        font-weight: 600;
        color: var(--ink);
      }
      .card-hint {
        font-size: 12.5px;
        color: var(--mute);
      }

      .foot {
        padding: 24px 40px;
        text-align: center;
        font-size: 12px;
        color: var(--mute);
      }
      .foot a {
        color: var(--brand);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <nav class="topbar">
      <div class="topbar-inner">
        <span class="topbar-brand">
          <span class="topbar-mark">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#533afd"
              stroke-width="1.9"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <line x1="6" x2="6" y1="3" y2="15"></line>
              <circle cx="18" cy="6" r="3"></circle>
              <circle cx="6" cy="18" r="3"></circle>
              <path d="M18 9a9 9 0 0 1-9 9"></path>
            </svg>
          </span>
          <span class="topbar-title">Web design</span>
        </span>
        <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle dark mode">
          <svg
            class="icon-sun"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="4"></circle>
            <path
              d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"
            ></path>
          </svg>
          <svg
            class="icon-moon"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"></path>
          </svg>
        </button>
      </div>
    </nav>

    <main class="hub">
      <div>
        <h1 class="hub-title">Web design</h1>
        <p class="hub-sub">Pick a resource to get started</p>
      </div>

      <div class="cards">
        <a class="card" href="https://github.com/everydaydesign/git-guide">
          <span class="card-icon">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <line x1="6" x2="6" y1="3" y2="15"></line>
              <circle cx="18" cy="6" r="3"></circle>
              <circle cx="6" cy="18" r="3"></circle>
              <path d="M18 9a9 9 0 0 1-9 9"></path>
            </svg>
          </span>
          <span class="card-label">Git guide</span>
          <span class="card-hint">Collaborate with Git</span>
        </a>

        <a class="card" href="https://github.com/everydaydesign/website">
          <span class="card-icon">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <polyline points="16 18 22 12 16 6"></polyline>
              <polyline points="8 6 2 12 8 18"></polyline>
            </svg>
          </span>
          <span class="card-label">Website</span>
          <span class="card-hint">HTML &amp; CSS template</span>
        </a>

        <a class="card" href="https://github.com/everydaydesign/web-app">
          <span class="card-icon">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
              <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
              <path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"></path>
            </svg>
          </span>
          <span class="card-label">Web app</span>
          <span class="card-hint">PHP &amp; MySQL template</span>
        </a>
      </div>
    </main>

    <footer class="foot">
      © 2026 Montathar Faraon · Licensed under the
      <a href="https://github.com/everydaydesign/webdesign/blob/main/LICENSE">MIT License</a>
    </footer>

    <script>
      (function () {
        var btn = document.querySelector("[data-theme-toggle]");
        if (!btn) return;
        btn.addEventListener("click", function () {
          var root = document.documentElement;
          var next = root.dataset.theme === "dark" ? "light" : "dark";
          root.dataset.theme = next;
          try {
            localStorage.setItem("theme", next);
          } catch (e) {}
        });
      })();
    </script>
  </body>
</html>
